<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZUZ Clicker — Секретная зона</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(145deg, #0A0A0A 0%, #1A1A1A 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: system-ui, sans-serif; color: white; padding: 16px; }
        .game-container { max-width: 480px; width: 100%; background: rgba(20,20,30,0.7); backdrop-filter: blur(10px); border-radius: 48px; padding: 20px; border: 1px solid rgba(212,175,55,0.3); text-align: center; }
        .coin-wrapper { display: flex; justify-content: center; margin: 15px auto; }
        .coin-3d { width: 240px; height: 240px; cursor: pointer; transition: transform 0.07s cubic-bezier(0.2,1.2,0.8,1); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .coin-3d:active { transform: scale(0.94) rotate(2deg); }
        .coin-inner { width: 100%; height: 100%; background: radial-gradient(circle at 35% 35%, #FFF0A8, #D4AF37, #B8860B); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 64px; font-weight: 900; color: #2A1A00; text-shadow: 0 2px 10px rgba(255,215,0,0.8); box-shadow: 0 10px 25px rgba(0,0,0,0.4), inset 0 -8px 15px rgba(0,0,0,0.3), inset 0 5px 10px rgba(255,255,200,0.6); border: 2px solid #FFE066; }
        .secret-hint { font-size: 12px; margin: 8px 0 10px; color: #D4AF37; opacity: 0.7; }
        .stats { background: rgba(0,0,0,0.5); border-radius: 32px; padding: 16px; margin: 16px 0; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; font-weight: 500; }
        .energy-bar-container { background: #2A2A2A; border-radius: 20px; height: 14px; overflow: hidden; margin: 10px 0; }
        .energy-fill { background: linear-gradient(90deg, #00D18C, #00FFB3); width: 100%; height: 100%; transition: width 0.2s; border-radius: 20px; }
        .click-effect { position: fixed; pointer-events: none; font-size: 38px; font-weight: bold; color: #00FFAA; text-shadow: 0 0 8px #00D18C; animation: floatUp 0.6s ease-out forwards; z-index: 9999; white-space: nowrap; }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); } 70% { opacity: 0.8; transform: translate(-50%, -120%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -180%) scale(1.5); } }
        button { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #0A0A0A; border: none; padding: 10px 18px; border-radius: 40px; font-weight: bold; font-size: 14px; margin: 6px 4px; cursor: pointer; transition: 0.05s linear; }
        button:active { transform: scale(0.96); }
        .level-badge { background: linear-gradient(135deg, #D4AF37, #FFD966); color: #1A1A1A; border-radius: 30px; padding: 6px 16px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .secret-toast { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #D4AF37; color: #0A0A0A; text-align: center; padding: 12px; border-radius: 40px; font-weight: bold; z-index: 9999; animation: fadeOut 3s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 500px) { .game-container { padding: 16px; } .coin-3d { width: 200px; height: 200px; } .coin-inner { font-size: 48px; } .stat-row { font-size: 14px; } button { padding: 8px 14px; font-size: 12px; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="level-badge" id="levelDisplay">🏆 Уровень 1</div>
    <div class="coin-wrapper">
        <div class="coin-3d" id="coin"><div class="coin-inner">ZUZ</div></div>
    </div>
    <div class="secret-hint">✨ Где-то на монете спрятан секрет ✨</div>
    <div class="stats">
        <div class="stat-row"><span>💎 Dust</span><span id="dustBalance">0</span></div>
        <div class="stat-row"><span>⚡ Энергия</span><span id="energyValue">100</span></div>
        <div class="energy-bar-container"><div class="energy-fill" id="energyFill" style="width: 100%"></div></div>
        <div class="stat-row"><span>💪 Сила клика</span><span id="clickPower">1</span></div>
        <div class="stat-row"><span>🏆 Кликов</span><span id="totalClicks">0</span></div>
    </div>
    <div>
        <button id="dailyBtn">🎁 Ежедневный бонус</button>
        <button id="autoMinerBtn">⚙️ Авто-кликер</button>
        <button id="leaderboardBtn">🏅 Лидеры</button>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // Универсальная функция показа алерта
    function showAlert(msg) {
        if (tg.showPopup) {
            tg.showPopup({ message: msg, buttons: [{ type: 'ok' }] });
        } else {
            alert(msg);
        }
    }
    
    let userId = tg.initDataUnsafe.user?.id;
    let username = tg.initDataUnsafe.user?.username || tg.initDataUnsafe.user?.first_name || "Игрок";
    
    let dust = 0, energy = 100, clickPower = 1, totalClicks = 0, level = 1;
    
    const API_URL = window.location.origin;
    
    async function login() {
        try {
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegram_id: userId, username })
            });
            const data = await res.json();
            if (data.error) { showAlert('Ошибка: ' + data.error); return; }
            dust = data.balance_dust ?? 0;
            energy = data.energy ?? 100;
            clickPower = data.click_power ?? 1;
            totalClicks = data.total_clicks ?? 0;
            level = data.level ?? 1;
            updateUI();
            if (data.isNew) showAlert('🎁 Ты получил 500 Dust и +50 энергии! Начни кликать!');
        } catch(e) { showAlert('Ошибка подключения к серверу'); }
    }
    
    function updateUI() {
        document.getElementById('dustBalance').innerText = dust;
        document.getElementById('energyValue').innerText = energy;
        document.getElementById('clickPower').innerText = clickPower;
        document.getElementById('totalClicks').innerText = totalClicks;
        document.getElementById('levelDisplay').innerHTML = `🏆 Уровень ${level}`;
        const percent = Math.max(0, Math.min(100, (energy / 100) * 100));
        document.getElementById('energyFill').style.width = `${percent}%`;
    }
    
    function showSecretToast(msg) {
        let old = document.querySelector('.secret-toast');
        if (old) old.remove();
        let toast = document.createElement('div');
        toast.className = 'secret-toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function showClickEffect(power, x, y) {
        const el = document.createElement('div');
        el.className = 'click-effect';
        el.innerText = `+${power}`;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 550);
    }
    
    async function handleClick(e) {
        if (energy < 1) {
            showAlert("⛔ Нет энергии! Подожди 5 минут");
            return;
        }
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const coin = document.getElementById('coin');
        const rect = coin.getBoundingClientRect();
        const clickX = ((clientX - rect.left) / rect.width) * 100;
        const clickY = ((clientY - rect.top) / rect.height) * 100;
        
        try {
            const res = await fetch(`${API_URL}/api/click`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegram_id: userId, clickX, clickY })
            });
            const data = await res.json();
            if (data.success) {
                dust = data.dust;
                energy = data.energy;
                level = data.level;
                clickPower = data.clickPower;
                totalClicks = data.totalClicks;
                updateUI();
                if (data.secretBonus) showSecretToast(data.secretMessage);
                showClickEffect(data.clickPower, clientX, clientY);
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            } else {
                showAlert(data.message);
            }
        } catch(err) {
            showAlert('Ошибка сети, попробуй ещё раз');
        }
    }
    
    document.getElementById('coin').addEventListener('click', handleClick);
    document.getElementById('coin').addEventListener('touchstart', handleClick, { passive: false });
    
    document.getElementById('dailyBtn').onclick = async () => {
        try {
            const res = await fetch(`${API_URL}/api/daily`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegram_id: userId })
            });
            const data = await res.json();
            if (data.success) {
                dust += data.bonus;
                updateUI();
                showAlert(`🎁 Ежедневный бонус: +${data.bonus} Dust! Стрик: ${data.streak} дней`);
            } else {
                showAlert(data.message);
            }
        } catch(e) { showAlert('Ошибка сети'); }
    };
    
    document.getElementById('autoMinerBtn').onclick = async () => {
        try {
            const res = await fetch(`${API_URL}/api/buy_auto_miner`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegram_id: userId })
            });
            const data = await res.json();
            if (data.success) {
                showAlert(`✅ Авто-кликер улучшен до уровня ${data.newLevel}!`);
                login();
            } else {
                showAlert(data.message);
            }
        } catch(e) { showAlert('Ошибка сети'); }
    };
    
    document.getElementById('leaderboardBtn').onclick = async () => {
        try {
            const res = await fetch(`${API_URL}/api/leaderboard`);
            const leaders = await res.json();
            let msg = "🏆 ТОП-10 КЛИКЕРОВ 🏆\n\n";
            leaders.forEach((u, i) => {
                msg += `${i+1}. ${u.username} — ${u.total_clicks} кликов (ур. ${u.level})\n`;
            });
            showAlert(msg);
        } catch(e) { showAlert('Ошибка загрузки лидеров'); }
    };
    
    login();
</script>
</body>
</html>
